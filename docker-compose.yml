services:
  # ===== AI-ДВИЖОК =====
  ollama:
    image: ollama/ollama:0.4.7
    container_name: rag_engine
    runtime: nvidia
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===== ВЕКТОРНАЯ БАЗА ДАННЫХ =====
  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: rag_memory
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ===== БАЗА ДАННЫХ =====
  db:
    image: postgres:16-alpine
    container_name: rag_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: n8n_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ===== ОРКЕСТРАТОР =====
  n8n:
    image: n8nio/n8n:latest
    container_name: rag_orchestrator
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_PORT: 5678
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n_admin}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    volumes:
      - ./n8n_data:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy

networks:
  default:
    name: rag_network